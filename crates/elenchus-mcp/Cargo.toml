[package]
name = "elenchus-mcp"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Model Context Protocol (MCP) server for the elenchus reasoning engine: exposes an `elenchus_check` tool over stdio JSON-RPC for AI agents."
readme = "README.md"
keywords = ["mcp", "logic", "reasoning", "sat", "ai"]
categories = ["command-line-utilities", "mathematics"]

[[bin]]
name = "elenchus-mcp"
path = "src/main.rs"

# WiX config for the Windows `.msi` installer (cargo-dist + WiX v3). Generated by
# `dist init`; the GUIDs match `wix/main.wxs` and MUST stay stable across releases
# — `upgrade-guid` is the product identity Windows uses to upgrade/uninstall (the
# app then shows up in "Add or remove programs"), `path-guid` keys the PATH entry.
[package.metadata.wix]
upgrade-guid = "AC3CD6A2-A956-43CA-B8ED-0836A4F67946"
path-guid = "DB4C70E1-7326-4D7F-8D8F-C4450AD1FB73"
license = false
eula = false

[dependencies]
elenchus-solver = { workspace = true, features = ["std"] }
serde_json = { workspace = true }
