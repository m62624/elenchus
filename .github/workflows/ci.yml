name: CI

on:
  # Not tied to a specific branch: pushes to any branch and PRs against any base
  # branch run CI (so an integration branch collecting many PRs is covered too).
  push:
    paths:
      - ".github/workflows/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        required: false
        type: string
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  # --- linter + tests, fanned out across all three OSes in parallel ----------
  # One matrix entry per OS, no cross-job `needs`, so Linux/Windows/macOS each
  # run fmt + clippy + test independently and any single failure is visible at
  # a glance (fail-fast off keeps the others going).

  check:
    name: lint + test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Linux, os: ubuntu-latest }
          - { name: Windows, os: windows-latest }
          - { name: macOS, os: macos-latest }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  # --- portability checks, in parallel with the lint+test matrix above -------

  no_std:
    name: no_std build (wasm32v1-none)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Build libraries for a real no_std target
        run: >-
          cargo build
          -p elenchus-parser -p elenchus-compiler -p elenchus-solver
          --no-default-features --target wasm32v1-none

  dist-plan:
    name: cargo-dist plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install dist
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Validate the release plan
        run: dist plan
