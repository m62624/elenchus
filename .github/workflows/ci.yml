name: CI

on:
  # Push CI runs only on the default branch (post-merge validation). Feature
  # branches are covered by the pull_request event below, so a branch with an
  # open PR is not built twice (one push run + one PR run racing each other).
  # rc/v* release branches run through workflow_call, not this trigger.
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
  # No paths filter on PRs on purpose: the branch-protection gate (`ci-pass`
  # below) is a *required* check, so it must ALWAYS report. With a paths filter a
  # docs-only PR would never start the workflow and the required check would hang
  # forever ("Expected — waiting for status"). CI is cached and cheap, so we just
  # let it run on every PR.
  pull_request:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        required: false
        type: string
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  # --- linter + tests, fanned out across all three OSes in parallel ----------
  # One matrix entry per OS, no cross-job `needs`, so Linux/Windows/macOS each
  # run fmt + clippy + test independently and any single failure is visible at
  # a glance (fail-fast off keeps the others going).

  check:
    name: lint + test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Linux, os: ubuntu-latest }
          - { name: Windows, os: windows-latest }
          - { name: macOS, os: macos-latest }
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  # --- portability checks, in parallel with the lint+test matrix above -------

  no_std:
    name: no_std build (wasm32v1-none)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      - name: Build libraries for a real no_std target
        run: >-
          cargo build
          -p elenchus-parser -p elenchus-compiler -p elenchus-solver
          --no-default-features --target wasm32v1-none

  # Build the npm/wasm package the way a release does (wasm-pack + assemble) and
  # smoke-test it through Node, so the published artifact can never silently rot.
  wasm-pack:
    name: wasm npm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install wasm-pack
        run: npm install -g wasm-pack
      - name: Build and assemble the npm package
        working-directory: crates/elenchus-wasm
        run: node scripts/build-npm.mjs
      - name: Test the package through Node
        working-directory: crates/elenchus-wasm
        run: node --test test/smoke.test.mjs

  dist-plan:
    name: cargo-dist plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install dist
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Validate the release plan
        run: dist plan

  # --- single branch-protection gate -----------------------------------------
  # Make ONLY this check "required" on the protected branch. It aggregates every
  # real job above, so branch protection never needs editing when jobs are
  # added/removed, and it reports for every PR (no paths filter) — including the
  # release sync PR, which reuses this same workflow. `if: always()` lets it run
  # even when a dependency failed, so it can turn that into a red required check.
  ci-pass:
    name: CI passed
    if: always()
    needs: [check, no_std, wasm-pack, dist-plan]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required CI job failed or was cancelled:"
          echo "  check     = ${{ needs.check.result }}"
          echo "  no_std    = ${{ needs.no_std.result }}"
          echo "  wasm-pack = ${{ needs.wasm-pack.result }}"
          echo "  dist-plan = ${{ needs.dist-plan.result }}"
          exit 1
      - name: All required jobs passed
        run: echo "lint + test (all OSes), no_std, wasm-pack and dist-plan are green."
